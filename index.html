<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Compass | True North for Android</title>
    <link rel="icon" type="image/svg+xml" href="/compass-favicon.svg" />
    <meta name="title" content="Compass | True North for Android" />
    <meta name="description" content="The most advanced digital compass for Android. Beautifully designed, aerospace-grade accuracy, and built for true explorers." />
    <meta name="keywords" content="Compass, Android compass, digital compass, aerospace accuracy, navigation app" />
    <meta name="author" content="Paramjit Baral" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://compass-app.com/" />
    <meta property="og:title" content="Compass | True North for Android" />
    <meta property="og:description" content="The most advanced digital compass for Android. Beautifully designed, aerospace-grade accuracy, and built for true explorers." />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://compass-app.com/" />
    <meta property="twitter:title" content="Compass | True North for Android" />
    <meta property="twitter:description" content="The most advanced digital compass for Android. Beautifully designed, aerospace-grade accuracy, and built for true explorers." />

    <!-- Security Configuration -->
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Theme Color for Mobile Browsers -->
    <meta name="theme-color" content="#0f172a" />
    
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <!-- Instant Initial Page Loader -->
      <style>
        .app-initial-loader {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background-color: #ffffff;
          z-index: 999999;
          font-family: system-ui, -apple-system, sans-serif;
        }
        .app-spinner {
          width: 48px;
          height: 48px;
          border: 4px solid #f1f5f9;
          border-top-color: #0284c7; /* Primary Blue */
          border-radius: 50%;
          animation: app-spin 1s linear infinite;
          margin-bottom: 24px;
        }
        @keyframes app-spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        .app-loader-text {
          color: #64748b;
          font-size: 13px;
          font-weight: 600;
          letter-spacing: 0.15em;
          text-transform: uppercase;
          animation: app-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes app-pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.5; }
        }
      </style>
      <div class="app-initial-loader">
        <div class="app-spinner"></div>
        <div class="app-loader-text">Loading Compass</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
